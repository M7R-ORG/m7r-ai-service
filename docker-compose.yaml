  ai-service-db:
    image: postgres:latest
    container_name: ai-service-db
    restart: on-failure
    environment:
      - POSTGRES_PASSWORD=SecretPassword161
      - POSTGRES_USER=user
      - POSTGRES_DB=AIDB
    ports:
      - 5432:5432
    volumes:
      - ./.meta/postgres:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    external: true
