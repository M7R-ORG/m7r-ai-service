services:
  ai-service:
    image: samarkinivan/ai-service:latest
    container_name: ai-service
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    ports:
      - '8085:8085'
    depends_on:
      - ai-service-db

  ai-service-db:
    image: postgres:latest
    container_name: ai-service-db
    restart: on-failure
    env_file: .env
    ports:
      - 5432:5432
    volumes:
      - ./.meta/postgres:/var/lib/postgresql/data
